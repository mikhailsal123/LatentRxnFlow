eval:
  checkpoint_path: models/flow_nerf_baseline_epoch_490.pt
  pickle_path: data/test_data_rr_only_condition.pickle
  temperature: 0.7
  batch_size: 128
  use_wandb: false

model:
  latent_dim: 256
  time_embed_dim: 64
  cond_dim: 640
  ntoken: 128
  flow_weight: 0
  fm_sigma: 0.0
  detach_encoder_for_flow: true
  use_conditional_flow: true
  flow_cond_head: film_residual_add
  film_hidden_dim: 256
  film_init_zero: true
  cond_pool: None
  condition_source: fp
  flow_sampling_cfg:
    t_sampling: beta
    beta_a: 0.5
    beta_b: 0.5
  decoder:
    delta_source: ode
    input_mode: fuse

data:
  num_workers: 24

diagnose:
  n_reactions: 10000
  n_trajectory_steps: 10
  aimnet_workers: 12
  aimnet_batch_size: 128
  save_path: experiments/trajectory_diagnostic

experiment:
  project: flow-nerf-diagnostic
  name: trajectory-aimnet-diagnostic
  output_dir: experiments
