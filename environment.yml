name: latentrxnflow
channels:
  - conda-forge
dependencies:
  - python=3.10
  - libstdcxx-ng>=13.2
  - libgcc-ng>=13.2
  - numpy=1.26.*
  - pyyaml=6.*
  - tqdm>=4.64
  - rdkit=2024.03.*
  - scikit-learn=1.6.*
  - matplotlib=3.10.*
  - pillow>=10.0
  - pip
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/nightly/cu128
    - --pre torch
    - wandb>=0.16
    - transformers>=4.30
    - torchdiffeq>=0.2.5